<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | Posterium</title>
  <meta name="description" content="This page doesn't exist. Redirecting you back to Posterium." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="canonical" href="https://posters.spicydevs.xyz/" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #09090b;
      --surface:   #0d0d0f;
      --border:    rgba(255,255,255,0.07);
      --indigo:    #6366f1;
      --violet:    #7c3aed;
      --zinc-200:  #e4e4e7;
      --zinc-400:  #a1a1aa;
      --zinc-500:  #71717a;
      --zinc-600:  #52525b;
      --zinc-700:  #3f3f46;
      --zinc-800:  #27272a;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--zinc-200);
      font-family: 'Plus Jakarta Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ── Dot grid background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Glow orbs ── */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }
    .orb-1 {
      width: 500px; height: 500px;
      top: -150px; left: -100px;
      background: radial-gradient(circle, rgba(99,102,241,0.25), transparent 70%);
      animation: drift-a 8s ease-in-out infinite alternate;
    }
    .orb-2 {
      width: 400px; height: 400px;
      bottom: -100px; right: -80px;
      background: radial-gradient(circle, rgba(139,92,246,0.2), transparent 70%);
      animation: drift-b 10s ease-in-out infinite alternate;
    }

    @keyframes drift-a {
      from { transform: translate(0,0); }
      to   { transform: translate(40px, 30px); }
    }
    @keyframes drift-b {
      from { transform: translate(0,0); }
      to   { transform: translate(-30px, -20px); }
    }

    /* ── Layout ── */
    .wrapper {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    /* ── Logo ── */
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 48px;
      text-decoration: none;
      opacity: 0;
      animation: rise 0.7s cubic-bezier(0.16,1,0.3,1) 0.1s forwards;
    }
    .logo-icon {
      width: 28px; height: 28px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--indigo), var(--violet));
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 20px rgba(99,102,241,0.4);
      flex-shrink: 0;
    }
    .logo-icon svg { display: block; }
    .logo-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--zinc-200);
      letter-spacing: -0.02em;
    }

    /* ── 404 giant number ── */
    .error-code {
      font-size: clamp(96px, 18vw, 180px);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.05em;
      background: linear-gradient(135deg, #fff 0%, #e4e4e7 30%, #a5b4fc 65%, #818cf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0;
      animation: rise 0.8s cubic-bezier(0.16,1,0.3,1) 0.2s forwards;
      position: relative;
    }

    /* Glitch layers */
    .error-code::before,
    .error-code::after {
      content: '404';
      position: absolute;
      inset: 0;
      -webkit-background-clip: text;
      background-clip: text;
    }
    .error-code::before {
      background: linear-gradient(135deg, rgba(99,102,241,0.6), transparent);
      -webkit-text-fill-color: transparent;
      animation: glitch-a 4s infinite;
    }
    .error-code::after {
      background: linear-gradient(135deg, rgba(167,139,250,0.4), transparent);
      -webkit-text-fill-color: transparent;
      animation: glitch-b 4s infinite;
    }

    @keyframes glitch-a {
      0%, 90%, 100% { transform: translate(0); opacity: 0; }
      92%            { transform: translate(-3px, 1px); opacity: 1; }
      94%            { transform: translate(3px, -1px); opacity: 1; }
      96%            { transform: translate(-2px, 0); opacity: 1; }
      98%            { transform: translate(0); opacity: 0; }
    }
    @keyframes glitch-b {
      0%, 90%, 100% { transform: translate(0); opacity: 0; }
      93%            { transform: translate(3px, 2px); opacity: 1; }
      95%            { transform: translate(-3px, -1px); opacity: 1; }
      97%            { transform: translate(2px, 0); opacity: 1; }
      99%            { transform: translate(0); opacity: 0; }
    }

    /* ── Film-strip decoration ── */
    .film-strip {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 12px 0 20px;
      opacity: 0;
      animation: rise 0.7s cubic-bezier(0.16,1,0.3,1) 0.35s forwards;
    }
    .film-hole {
      width: 8px; height: 8px;
      border-radius: 2px;
      background: var(--zinc-700);
    }
    .film-frame {
      width: 32px; height: 22px;
      border-radius: 3px;
      border: 1px solid var(--border);
      background: var(--surface);
      display: flex; align-items: center; justify-content: center;
    }
    .film-frame svg { opacity: 0.3; }

    /* ── Heading & sub ── */
    h1 {
      font-size: clamp(18px, 3vw, 22px);
      font-weight: 700;
      color: var(--zinc-200);
      letter-spacing: -0.02em;
      margin-bottom: 10px;
      opacity: 0;
      animation: rise 0.7s cubic-bezier(0.16,1,0.3,1) 0.4s forwards;
    }

    .subtitle {
      font-size: 13px;
      color: var(--zinc-500);
      line-height: 1.6;
      max-width: 340px;
      margin: 0 auto 36px;
      opacity: 0;
      animation: rise 0.7s cubic-bezier(0.16,1,0.3,1) 0.5s forwards;
    }

    /* ── Countdown card ── */
    .countdown-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 20px;
      border-radius: 16px;
      background: rgba(99,102,241,0.08);
      border: 1px solid rgba(99,102,241,0.2);
      margin-bottom: 28px;
      opacity: 0;
      animation: rise 0.7s cubic-bezier(0.16,1,0.3,1) 0.6s forwards;
    }

    /* SVG ring countdown */
    .ring-wrap {
      position: relative;
      width: 44px;
      height: 44px;
      flex-shrink: 0;
    }
    .ring-wrap svg {
      transform: rotate(-90deg);
    }
    .ring-bg {
      fill: none;
      stroke: rgba(99,102,241,0.15);
      stroke-width: 3;
    }
    .ring-progress {
      fill: none;
      stroke: var(--indigo);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-dasharray: 119.38; /* 2π × 19 */
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear;
    }
    .ring-number {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 800;
      color: #a5b4fc;
      font-variant-numeric: tabular-nums;
    }

    .countdown-text {
      text-align: left;
    }
    .countdown-text strong {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #a5b4fc;
      margin-bottom: 2px;
    }
    .countdown-text span {
      font-size: 11px;
      color: var(--zinc-600);
    }

    /* Progress bar */
    .progress-bar-wrap {
      width: 100%;
      max-width: 320px;
      height: 2px;
      background: var(--zinc-800);
      border-radius: 99px;
      margin-bottom: 32px;
      overflow: hidden;
      opacity: 0;
      animation: rise 0.5s cubic-bezier(0.16,1,0.3,1) 0.65s forwards;
    }
    .progress-bar-fill {
      height: 100%;
      width: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--indigo), var(--violet));
      transform-origin: left;
      animation: drain 5s linear 0.8s forwards;
    }
    @keyframes drain {
      from { transform: scaleX(1); }
      to   { transform: scaleX(0); }
    }

    /* ── Buttons ── */
    .actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 10px;
      opacity: 0;
      animation: rise 0.7s cubic-bezier(0.16,1,0.3,1) 0.7s forwards;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 40px;
      padding: 0 20px;
      border-radius: 10px;
      background: var(--indigo);
      color: #fff;
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      text-decoration: none;
      border: none;
      cursor: pointer;
      box-shadow: 0 0 24px rgba(99,102,241,0.3);
      transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
    }
    .btn-primary:hover {
      background: #818cf8;
      box-shadow: 0 0 36px rgba(99,102,241,0.5);
      transform: translateY(-1px);
    }
    .btn-primary:active { transform: scale(0.97); }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 40px;
      padding: 0 16px;
      border-radius: 10px;
      background: transparent;
      color: var(--zinc-400);
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      text-decoration: none;
      border: 1px solid var(--border);
      transition: color 0.15s, border-color 0.15s, background 0.15s, transform 0.1s;
    }
    .btn-secondary:hover {
      color: var(--zinc-200);
      border-color: rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.04);
      transform: translateY(-1px);
    }
    .btn-secondary:active { transform: scale(0.97); }

    /* ── Quick links ── */
    .quick-links {
      margin-top: 40px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
      opacity: 0;
      animation: rise 0.7s cubic-bezier(0.16,1,0.3,1) 0.85s forwards;
    }
    .quick-label {
      font-size: 10px;
      color: var(--zinc-700);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-right: 4px;
    }
    .quick-link {
      font-size: 11px;
      color: var(--zinc-600);
      text-decoration: none;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .quick-link:hover {
      color: var(--zinc-300);
      border-color: var(--border);
    }

    /* ── Animations ── */
    @keyframes rise {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Redirect flash overlay ── */
    .redirect-flash {
      position: fixed;
      inset: 0;
      background: var(--bg);
      opacity: 0;
      pointer-events: none;
      z-index: 100;
      transition: opacity 0.4s ease;
    }
    .redirect-flash.active { opacity: 1; pointer-events: all; }
  </style>
</head>
<body>

  <div class="orb orb-1" aria-hidden="true"></div>
  <div class="orb orb-2" aria-hidden="true"></div>
  <div class="redirect-flash" id="flash" aria-hidden="true"></div>

  <div class="wrapper">

    <!-- Logo -->
    <a href="/" class="logo" aria-label="Posterium home">
      <div class="logo-icon" aria-hidden="true">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3l1.5 4.5H18l-3.75 2.7 1.5 4.5L12 12l-3.75 2.7 1.5-4.5L6 7.5h4.5z"/>
        </svg>
      </div>
      <span class="logo-name">Posterium</span>
    </a>

    <!-- 404 number -->
    <div class="error-code" aria-label="Error 404">404</div>

    <!-- Film strip decoration -->
    <div class="film-strip" aria-hidden="true">
      <div class="film-hole"></div>
      <div class="film-frame">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="white"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM5 4.5h14V9H5V4.5zM5 10.5h6v9H5v-9zm7 9v-9h7v9h-7z"/></svg>
      </div>
      <div class="film-hole"></div>
      <div class="film-hole"></div>
      <div class="film-frame">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
      </div>
      <div class="film-hole"></div>
      <div class="film-hole"></div>
      <div class="film-frame">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="white"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM5 4.5h14V9H5V4.5zM5 10.5h6v9H5v-9zm7 9v-9h7v9h-7z"/></svg>
      </div>
      <div class="film-hole"></div>
    </div>

    <!-- Heading -->
    <h1>This reel is missing</h1>
    <p class="subtitle">
      The page you're looking for doesn't exist or was moved.<br>
      Redirecting you back to the poster editor.
    </p>

    <!-- Countdown -->
    <div class="countdown-card" role="status" aria-live="polite" aria-label="Redirecting in 5 seconds">
      <div class="ring-wrap">
        <svg width="44" height="44" viewBox="0 0 44 44">
          <circle class="ring-bg" cx="22" cy="22" r="19" />
          <circle class="ring-progress" id="ring" cx="22" cy="22" r="19" />
        </svg>
        <div class="ring-number" id="countdown-num">5</div>
      </div>
      <div class="countdown-text">
        <strong>Redirecting automatically</strong>
        <span>Taking you home in <span id="countdown-inline">5</span> seconds</span>
      </div>
    </div>

    <!-- Progress bar -->
    <div class="progress-bar-wrap" aria-hidden="true">
      <div class="progress-bar-fill"></div>
    </div>

    <!-- Action buttons -->
    <div class="actions">
      <a href="/" class="btn-primary" id="home-btn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Go Home Now
      </a>
      <a href="/build" class="btn-secondary">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6M9 12h6M9 15h4"/>
        </svg>
        Open Builder
      </a>
    </div>

    <!-- Quick links -->
    <nav class="quick-links" aria-label="Quick navigation">
      <span class="quick-label">Jump to</span>
      <a href="/#features" class="quick-link">Features</a>
      <a href="/#badges" class="quick-link">Badges</a>
      <a href="/#demo" class="quick-link">Demo</a>
      <a href="/#api" class="quick-link">API</a>
      <a href="https://github.com/xdaayush/freeposterapi" class="quick-link" target="_blank" rel="noreferrer">GitHub</a>
    </nav>

  </div>

  <script>
    (function () {
      const TOTAL = 5;
      const CIRCUMFERENCE = 2 * Math.PI * 19; // 119.38
      const ring   = document.getElementById('ring');
      const numEl  = document.getElementById('countdown-num');
      const inlineEl = document.getElementById('countdown-inline');
      const flash  = document.getElementById('flash');

      let remaining = TOTAL;

      // Set initial ring state
      ring.style.strokeDashoffset = '0';

      const tick = () => {
        remaining -= 1;

        // Update number display
        numEl.textContent  = remaining;
        inlineEl.textContent = remaining;

        // Update ring: drain from full to empty
        const pct = remaining / TOTAL;
        ring.style.strokeDashoffset = String(CIRCUMFERENCE * (1 - pct));

        if (remaining <= 0) {
          // Fade out and redirect
          flash.classList.add('active');
          setTimeout(() => { window.location.href = '/'; }, 400);
          return;
        }

        setTimeout(tick, 1000);
      };

      // Start countdown after animations settle
      setTimeout(tick, 1000);

      // Cancel redirect if user clicks any link
      document.querySelectorAll('a').forEach(a => {
        a.addEventListener('click', () => {
          remaining = 999; // stops the countdown
        });
      });
    })();
  </script>

</body>
</html>
