name: Posterium Release Gauntlet

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validate-and-benchmark:
    name: Build, Test, and Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: 🛎️ Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      # 1. Base Checks
      - name: 🕵️‍♂️ Typecheck
        run: npm run typecheck
      
      - name: 🧪 Unit Tests
        run: npm run test

      # 2. Build Static Assets
      - name: 🏗️ Build Astro Site
        run: npm run build

      # 3. Custom SEO Schema Validation
      - name: 📊 Validate FAQ JSON-LD
        run: node scripts/validate-faq-jsonld.mjs

      # 4. Broken Link & Image Check (Using Lychee)
      - name: 🔗 Check Internal Links
        uses: lycheeverse/lychee-action@v1.9.3
        with:
          # Checks all HTML files in dist/ but ignores external web links (offline mode)
          args: --offline ./dist/**/*.html
          fail: true

      # 5. Lighthouse CI
      - name: 🚦 Run Lighthouse CI
        run: npm run test:lhci
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
