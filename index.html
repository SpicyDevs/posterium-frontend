<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <!-- ═══════════════════════════════════════════════
         CRITICAL FONTS — loaded synchronously here so
         they are available before React paints a single
         character.  vite-plugin-webfont-dl replaces
         the href with local /assets/ paths at build time.
         DO NOT move font loading to JS (causes FOUT).
    ═══════════════════════════════════════════════ -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=JetBrains+Mono:wght@400;500&display=block"
  />
  <!--
    display=block  ← browser HOLDS text until font arrives.
    This eliminates the "system font flash → correct font" FOUT.
    The tradeoff (blank text for ~100-300 ms on slow connections)
    is preferable to the jarring font swap.  On fast connections /
    cached visits (vite plugin serves from /assets/) it is instant.
  -->

  <!-- ═══════════════════════════════════════════════
         CANONICAL & PRECONNECTS
    ═══════════════════════════════════════════════ -->
  <link rel="canonical" href="https://posters.spicydevs.xyz/" />
  <link rel="preconnect" href="https://api.spicydevs.xyz" />
  <link rel="preconnect" href="https://image.tmdb.org" crossorigin />
  <link rel="dns-prefetch" href="https://api.spicydevs.xyz" />

  <!-- ═══════════════════════════════════════════════
         PRIMARY META
    ═══════════════════════════════════════════════ -->
  <title>Posterium - Posters with Ratings!</title>
  <meta name="description"
    content="Free movie and TV poster generator with live rating badges from IMDb, Rotten Tomatoes, Metacritic, and TMDB. Drag-and-drop editor, glassmorphism effects, instant API URL export. Perfect for Plex, Jellyfin, Discord bots, and Notion." />
  <meta name="keywords"
    content="movie poster generator, free poster API, IMDb rating badge, Rotten Tomatoes badge, Plex custom poster, Jellyfin poster" />
  <meta name="author" content="SpicyDevs" />
  <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="color-scheme" content="dark" />

  <!-- ═══════════════════════════════════════════════
         OPEN GRAPH
    ═══════════════════════════════════════════════ -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://posters.spicydevs.xyz/" />
  <meta property="og:title" content="Posterium - Free Movie & TV Poster Generator with Live Ratings" />
  <meta property="og:description"
    content="Generate stunning movie and TV posters with live IMDb, Rotten Tomatoes, Metacritic, and TMDB rating badges. Free, open-source, no account required." />
  <meta property="og:image" content="https://posters.spicydevs.xyz/og-image.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt"
    content="Posterium editor showing custom movie poster with IMDb and Rotten Tomatoes rating badges" />
  <meta property="og:site_name" content="Posterium" />
  <meta property="og:locale" content="en_US" />

  <!-- ═══════════════════════════════════════════════
         TWITTER CARD
    ═══════════════════════════════════════════════ -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@spicydevs" />
  <meta name="twitter:url" content="https://posters.spicydevs.xyz/" />
  <meta name="twitter:title" content="Posterium - Free Movie & TV Poster Generator" />
  <meta name="twitter:description"
    content="Design custom movie and TV posters with IMDb, RT, Metacritic, and TMDB badges. Free, open-source, instant API URL export. Perfect for Plex & Jellyfin." />
  <meta name="twitter:image" content="https://posters.spicydevs.xyz/og-image.jpg" />
  <meta name="twitter:image:alt" content="Posterium editor preview" />

  <!-- ═══════════════════════════════════════════════
         STRUCTURED DATA - WebApplication
    ═══════════════════════════════════════════════ -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Posterium",
      "alternateName": ["Free Poster API", "Movie Poster Generator"],
      "url": "https://posters.spicydevs.xyz/",
      "applicationCategory": "MultimediaApplication",
      "applicationSubCategory": "Photo Editing",
      "operatingSystem": "Web Browser",
      "browserRequirements": "Requires JavaScript. Requires a modern browser.",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
      "author": { "@type": "Organization", "name": "SpicyDevs", "url": "https://spicydevs.xyz" },
      "description": "Free online movie and TV poster generator with live rating badges from IMDb, Rotten Tomatoes, Metacritic, TMDB, Letterboxd, and more.",
      "screenshot": "https://posters.spicydevs.xyz/og-image.jpg",
      "softwareVersion": "2.0",
      "inLanguage": "en"
    }
  </script>

  <!-- ═══════════════════════════════════════════════
         STRUCTURED DATA - WebSite
    ═══════════════════════════════════════════════ -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Posterium",
      "url": "https://posters.spicydevs.xyz/",
      "description": "Free movie and TV poster generator with live IMDb, Rotten Tomatoes, and Metacritic rating badges.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": { "@type": "EntryPoint", "urlTemplate": "https://posters.spicydevs.xyz/build?q={search_term_string}" },
        "query-input": "required name=search_term_string"
      }
    }
  </script>
</head>

<body>
  <noscript>
    <div style="font-family: sans-serif; max-width: 700px; margin: 40px auto; padding: 20px">
      <h1>Posterium - Free Movie &amp; TV Poster Generator with Rating Badges</h1>
      <p>Generate custom movie and TV show posters with live rating badges from IMDb, Rotten Tomatoes, Metacritic, TMDB — all from a single API URL.</p>
      <p>Visit <a href="https://posters.spicydevs.xyz/build">posters.spicydevs.xyz/build</a> to open the visual editor.</p>
    </div>
  </noscript>
  <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>

</html>
